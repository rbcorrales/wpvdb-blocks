name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to release, for example v0.1.1
        required: true
        type: string

permissions:
  contents: write

jobs:
  run:
    uses: rbcorrales/wpvdb-scripts/.github/workflows/plugin-release.yml@main
    with:
      tag: ${{ github.event.inputs.tag || github.ref_name }}
      plugin-slug: wpvdb-blocks
      plugin-file: wpvdb-blocks.php
      composer-install: true
      bun-install: true
      php-analyze-command: composer analyze
      bun-lint-command: bun run lint
      build-command: bun run build
      i18n-command: bun run i18n
      required-artifacts: |
        build/blocks-manifest.php
        build/related-articles/block.json
      required-language-patterns: |
        languages/*.mo
        languages/wpvdb-blocks-*.json
      exclude-src: true
